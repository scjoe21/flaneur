name: 주간 자동 발행

on:
  schedule:
    - cron: '0 4 * * 6'   # 매주 토요일 오후 1시 KST (4:00 UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 사유 (선택)'
        required: false
        default: '수동 실행'

jobs:
  publish:
    name: 피드 수집 → AI 큐레이션 → 발행
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: pip install anthropic

      - name: 피드 수집
        continue-on-error: true
        run: python scripts/fetch_feeds.py

      - name: AI 큐레이션
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/curate.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "flaneur-bot"
          git config user.email "bot@flaneur.kr"
          git add data/feeds/ data/news.json
          git diff --cached --quiet || \
            git commit -m "주간 자동 발행 — $(date -u '+%Y-%m-%d')"
          git pull --rebase origin master
          git push
