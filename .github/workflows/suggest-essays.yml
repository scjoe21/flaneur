name: 에세이 소스 제안

on:
  # 매년 1월 1일, 7월 1일 오전 9시 KST (자정 UTC)
  schedule:
    - cron: '0 0 1 1 *'   # 1월 1일
    - cron: '0 0 1 7 *'   # 7월 1일

  # 관리자 수동 실행
  workflow_dispatch:
    inputs:
      force:
        description: '1월/7월이 아니어도 강제 실행'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  suggest:
    name: 에세이 소스 수집 및 제안
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 에세이 소스 제안 실행
        env:
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: python scripts/suggest_essay_sources.py

      - name: 결과 커밋 및 푸시
        run: |
          git config user.name  "flaneur-bot"
          git config user.email "bot@flaneur.kr"
          git add data/essay-suggestions.json
          git diff --cached --quiet || \
            git commit -m "에세이 소스 제안 갱신 — $(date -u '+%Y-%m')"
          git push
