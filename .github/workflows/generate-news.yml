name: 주간 콘텐츠 자동 생성

on:
  schedule:
    - cron: '0 15 * * 6'   # 토요일 자정 KST (15:00 UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 사유 (선택)'
        required: false
        default: '수동 실행'

jobs:
  generate:
    name: Claude API로 다음 주 콘텐츠 생성
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: anthropic 패키지 설치
        run: pip install anthropic

      - name: 콘텐츠 생성 실행
        run: python scripts/generate_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: news.json 커밋 및 푸시
        run: |
          git config user.name  "flaneur-bot"
          git config user.email "bot@flaneur.kr"
          git add data/news.json
          git diff --cached --quiet || \
            git commit -m "주간 콘텐츠 자동 생성 — $(date -u '+%Y-W%V')"
          git push
