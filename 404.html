<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 — Flâneur</title>
  <script>
    // GitHub Pages SPA 리디렉션
    const path = window.location.pathname;
    const search = window.location.search;
    sessionStorage.setItem('redirect', path + search);
    window.location.replace('/');
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px">
    <div>
      <div style="font-size:48px;margin-bottom:16px">🗺</div>
      <h1 style="font-family:var(--font-serif,serif);font-size:24px;margin-bottom:8px">페이지를 찾을 수 없습니다</h1>
      <p style="color:#6b6560;margin-bottom:24px">리디렉션 중입니다…</p>
      <a href="/" style="color:#2d5a27">← 메인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
