<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장함 — Flâneur</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .saved-page { padding: 48px 0 80px; }
    .saved-page__header { margin-bottom: 36px; }
    .saved-page__title {
      font-family: var(--font-serif);
      font-size: 28px; font-weight: 700;
      margin-bottom: 8px;
    }
    .saved-page__sub { font-size: 15px; color: var(--text-muted); }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .saved-full-item {
      background: var(--bg-card);
      border: 1px solid var(--gold-lt);
      border-radius: var(--radius-lg);
      padding: 22px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      background: #fffdf6;
    }
    .saved-full-item:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .saved-full-item__source {
      font-size: 12px; color: var(--text-light);
      margin-bottom: 8px;
    }
    .saved-full-item__title {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 600;
      line-height: 1.4; color: var(--text);
      margin-bottom: 10px;
    }
    .saved-full-item__summary {
      font-size: 13px; color: var(--text-muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .saved-full-item__remove {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg-subtle); color: var(--text-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: var(--transition);
    }
    .saved-full-item__remove:hover {
      background: #fee2e2; color: #dc2626;
    }
    .clear-all-btn {
      font-size: 13px; color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 20px;
      transition: var(--transition);
    }
    .clear-all-btn:hover { border-color: #dc2626; color: #dc2626; background: #fef2f2; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="site-header">
  <div class="container">
    <a href="index.html" class="site-logo">
      <span class="site-logo__kr">Flâneur</span>
    </a>
    <nav class="site-nav">
      <a href="index.html" class="nav-link">이번 주</a>
      <a href="essay.html" class="nav-link nav-link--essay">에세이</a>
      <a href="write.html" class="nav-link">✍ 쓰기</a>
      <a href="saved.html" class="nav-link active">저장함</a>
    </nav>
  </div>
</header>

<main class="saved-page">
  <div class="container">
    <div class="saved-page__header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <h1 class="saved-page__title">★ 저장한 내용</h1>
        <p class="saved-page__sub" id="saved-count-text">저장된 항목이 없습니다.</p>
      </div>
      <button class="clear-all-btn" id="clear-all-btn">전체 삭제</button>
    </div>

    <div class="saved-grid" id="saved-grid">
      <div class="empty-state">
        <div class="empty-state__icon">★</div>
        <div class="empty-state__text">
          아직 저장한 내용이 없습니다.<br>
          카드의 ☆ 버튼으로 핵심 내용을 저장해 보세요.
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ── 뉴스 모달 (재사용) ── -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-meta">
      <span class="modal-day"></span>
      <span style="color:var(--border)">·</span>
      <span class="modal-source"></span>
    </div>
    <h2 class="modal-title"></h2>
    <div class="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn--primary" id="modal-source-btn">원문 보기 →</button>
      <button class="btn btn--outline saved" id="modal-save-btn">★ 저장됨</button>
      <button class="btn btn--ghost" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- ── 푸터 ── -->
<footer class="site-footer">
  <div class="container">
    <p class="footer-copy">© 2026 Flâneur. 철학적 일상의 큐레이션.</p>
    <nav class="footer-nav">
      <a href="index.html">이번 주</a>
      <a href="essay.html">에세이</a>
    </nav>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
const DAY_CONFIG = {
  monday:    { label: '월요일', flag: '🇫🇷', country: 'france' },
  tuesday:   { label: '화요일', flag: '🇩🇪', country: 'germany' },
  wednesday: { label: '수요일', flag: '🇮🇹', country: 'italy' },
  thursday:  { label: '목요일', flag: '🇬🇧', country: 'uk' },
  friday:    { label: '금요일', flag: '🇺🇸', country: 'usa' },
};

let savedIds = new Set(JSON.parse(localStorage.getItem('flaneur_saved') || '[]'));
let newsData = null;
let openItem = null;

async function init() {
  try {
    const res = await fetch('data/news.json?v=' + Date.now());
    newsData  = await res.json();
  } catch { newsData = { items: [] }; }
  renderSavedGrid();
}

function renderSavedGrid() {
  const grid = document.getElementById('saved-grid');
  const items = (newsData?.items || []).filter(i => savedIds.has(i.id));

  document.getElementById('saved-count-text').textContent =
    items.length ? `${items.length}개 항목이 저장되어 있습니다.` : '저장된 항목이 없습니다.';

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">★</div>
      <div class="empty-state__text">아직 저장한 내용이 없습니다.<br>메인 페이지 카드의 ☆ 버튼으로 저장해 보세요.</div>
    </div>`;
    return;
  }

  grid.innerHTML = '';
  items.forEach(item => {
    const cfg = DAY_CONFIG[item.day] || {};
    const el  = document.createElement('div');
    el.className = 'saved-full-item';
    el.innerHTML = `
      <div class="saved-full-item__source">${cfg.flag || ''} ${item.source} · ${item.dayLabel}</div>
      <div class="saved-full-item__title">${item.title}</div>
      <div class="saved-full-item__summary">${item.summary}</div>
      <button class="saved-full-item__remove" data-id="${item.id}" title="저장 해제">★</button>
    `;
    el.querySelector('.saved-full-item__remove').addEventListener('click', e => {
      e.stopPropagation();
      savedIds.delete(item.id);
      localStorage.setItem('flaneur_saved', JSON.stringify([...savedIds]));
      el.remove();
      showToast('저장을 취소했습니다.');
      document.getElementById('saved-count-text').textContent =
        savedIds.size ? `${savedIds.size}개 항목이 저장되어 있습니다.` : '저장된 항목이 없습니다.';
    });
    el.addEventListener('click', () => openModal(item));
    grid.appendChild(el);
  });
}

function openModal(item) {
  openItem = item;
  const overlay = document.getElementById('modal-overlay');
  const cfg = DAY_CONFIG[item.day] || {};
  overlay.querySelector('.modal-day').textContent   = `${cfg.flag || ''} ${item.dayLabel}`;
  overlay.querySelector('.modal-source').innerHTML  = `<strong>${item.source}</strong>`;
  overlay.querySelector('.modal-title').textContent = item.title;
  overlay.querySelector('.modal-body').textContent  = item.detail;
  document.getElementById('modal-source-btn').onclick = () => window.open(item.sourceUrl, '_blank', 'noopener');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (!savedIds.size) return;
  if (!confirm('저장한 내용을 모두 삭제하시겠습니까?')) return;
  savedIds.clear();
  localStorage.setItem('flaneur_saved', '[]');
  renderSavedGrid();
  showToast('전체 삭제되었습니다.');
});

init();
</script>
</body>
</html>
