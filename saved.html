<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장함 — Flâneur</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .saved-page { padding: 48px 0 80px; }
    .saved-page__header { margin-bottom: 36px; }
    .saved-page__title {
      font-family: var(--font-serif);
      font-size: 28px; font-weight: 700;
      margin-bottom: 8px;
    }
    .saved-page__sub { font-size: 15px; color: var(--text-muted); }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .clip-card {
      background: #fffdf6;
      border: 1px solid var(--gold-lt);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      transition: var(--transition);
      position: relative;
    }
    .clip-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .clip-card__meta {
      font-size: 11px; color: var(--text-light);
      margin-bottom: 10px; letter-spacing: 0.02em;
    }
    .clip-card__text {
      font-size: 15px; color: var(--text);
      line-height: 1.75; font-style: italic;
      border-left: 3px solid var(--gold);
      padding-left: 14px;
      margin: 0 0 12px;
    }
    .clip-card__title {
      font-size: 12px; color: var(--text-muted);
    }
    .clip-card__remove {
      position: absolute; top: 14px; right: 14px;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg-subtle); color: var(--text-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; transition: var(--transition);
    }
    .clip-card__remove:hover { background: #fee2e2; color: #dc2626; }
    .clear-all-btn {
      font-size: 13px; color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 20px;
      transition: var(--transition);
    }
    .clear-all-btn:hover { border-color: #dc2626; color: #dc2626; background: #fef2f2; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="site-header">
  <div class="container">
    <a href="index.html" class="site-logo">
      <span class="site-logo__kr">Flâneur</span>
    </a>
    <nav class="site-nav">
      <a href="index.html" class="nav-link">이번 주</a>
      <a href="essay.html" class="nav-link nav-link--essay">에세이</a>
      <a href="write.html" class="nav-link">✍ 쓰기</a>
      <a href="saved.html" class="nav-link active">저장함</a>
    </nav>
  </div>
</header>

<main class="saved-page">
  <div class="container">
    <div class="saved-page__header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <h1 class="saved-page__title">✦ 저장한 구절</h1>
        <p class="saved-page__sub" id="saved-count-text">저장된 구절이 없습니다.</p>
      </div>
      <button class="clear-all-btn" id="clear-all-btn">전체 삭제</button>
    </div>

    <div class="saved-grid" id="saved-grid">
      <div class="empty-state">
        <div class="empty-state__icon">✦</div>
        <div class="empty-state__text">
          아직 저장한 구절이 없습니다.<br>
          자세히 보기에서 텍스트를 드래그해 구절을 저장해 보세요.
        </div>
      </div>
    </div>
  </div>
</main>

<!-- ── 뉴스 모달 (재사용) ── -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-meta">
      <span class="modal-day"></span>
      <span style="color:var(--border)">·</span>
      <span class="modal-source"></span>
    </div>
    <h2 class="modal-title"></h2>
    <div class="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn--primary" id="modal-source-btn">원문 보기 →</button>
      <button class="btn btn--ghost" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- ── 푸터 ── -->
<footer class="site-footer">
  <div class="container">
    <p class="footer-copy">© 2026 Flâneur. 철학적 일상의 큐레이션.</p>
    <nav class="footer-nav">
      <a href="index.html">이번 주</a>
      <a href="essay.html">에세이</a>
    </nav>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
let clipList = JSON.parse(localStorage.getItem('flaneur_clips') || '[]');

function renderClipGrid() {
  const grid = document.getElementById('saved-grid');

  document.getElementById('saved-count-text').textContent =
    clipList.length ? `${clipList.length}개 구절이 저장되어 있습니다.` : '저장된 구절이 없습니다.';

  if (!clipList.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">✦</div>
      <div class="empty-state__text">아직 저장한 구절이 없습니다.<br>자세히 보기에서 텍스트를 드래그해 저장해 보세요.</div>
    </div>`;
    return;
  }

  grid.innerHTML = '';
  [...clipList].reverse().forEach(clip => {
    const el = document.createElement('div');
    el.className = 'clip-card';
    el.innerHTML = `
      <div class="clip-card__meta">${clip.flag} ${clip.source} · ${clip.dayLabel}</div>
      <blockquote class="clip-card__text">${clip.text}</blockquote>
      <div class="clip-card__title">— ${clip.articleTitle}</div>
      <button class="clip-card__remove" data-id="${clip.clipId}" title="삭제">✕</button>
    `;
    el.querySelector('.clip-card__remove').addEventListener('click', e => {
      e.stopPropagation();
      clipList = clipList.filter(c => c.clipId !== clip.clipId);
      localStorage.setItem('flaneur_clips', JSON.stringify(clipList));
      el.remove();
      document.getElementById('saved-count-text').textContent =
        clipList.length ? `${clipList.length}개 구절이 저장되어 있습니다.` : '저장된 구절이 없습니다.';
      showToast('삭제했습니다.');
    });
    grid.appendChild(el);
  });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (!clipList.length) return;
  if (!confirm('저장한 구절을 모두 삭제하시겠습니까?')) return;
  clipList = [];
  localStorage.setItem('flaneur_clips', '[]');
  renderClipGrid();
  showToast('전체 삭제되었습니다.');
});

renderClipGrid();
</script>
</body>
</html>
